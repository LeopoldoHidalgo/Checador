<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Precios Pro</title>
  
  <style>
    :root {
      --color-fondo: #2c3e50; 
      --color-primario: #34495e;
      --color-acento: #2ecc71;
      --color-texto: #333;
    }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--color-fondo);
      color: var(--color-texto);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
    }

    .kiosko-container {
      width: 90%;
      max-width: 700px;
      background: #ffffff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      text-align: center;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    h1 { color: var(--color-primario); font-size: 3rem; margin: 0 0 10px 0; font-weight: 800; }
    .instruccion { font-size: 1.4rem; color: #7f8c8d; margin: 0 0 30px 0; }

    input[type="text"] {
      width: 100%;
      padding: 20px;
      font-size: 1.8rem;
      text-align: center;
      border: 3px solid #dfe6e9;
      border-radius: 12px;
      outline: none;
      background-color: #fafafa;
    }

    .btn-principal {
      width: 100%;
      padding: 20px;
      font-size: 1.8rem;
      background-color: #2980b9; 
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .display-precio {
      padding: 60px 20px; 
      background: #f1f2f6;
      border-radius: 15px;
      display: none; 
      animation: fadeIn 0.3s ease-in-out;
    }

    .nombre-producto { font-size: 2.5rem; color: var(--color-primario); font-weight: 700; margin: 0; }
    .presentacion-producto { font-size: 1.6rem; color: #7f8c8d; margin: 5px 0; }
    .precio-producto { font-size: 9.5rem; color: var(--color-acento); font-weight: 800; margin: 10px 0; }

    .contenedor-coincidencias {
      display: none;
      text-align: left;
      overflow-y: auto;
      flex-grow: 1;
      margin-bottom: 20px;
      padding-right: 5px;
    }

    .item-coincidencia {
      background: #fafafa;
      padding: 18px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 2px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .settings-icon {
      position: absolute;
      top: 15px;
      right: 15px;
      background: transparent;
      border: none;
      opacity: 0.15;
      cursor: pointer;
      font-size: 1.5rem;
      z-index: 10;
    }

    .settings-icon:hover { opacity: 0.8; }
    .oculto { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="kiosko-container">
    <button class="settings-icon" onclick="configurarCSV()">⚙️</button>
    
    <div id="pantallaCaptura">
      <h1>Verificador</h1>
      <p class="instruccion">Escanea el código o escribe el nombre</p>
      <input type="text" id="lectorEntrada" placeholder="Listo para buscar..." autofocus>
      <button class="btn-principal" onclick="accionVerificar()">Consultar Precio</button>
    </div>
    
    <div id="pantallaCoincidencias" class="contenedor-coincidencias">
      <p style="font-weight: bold; text-align: center; font-size: 1.2rem;">Selecciona tu producto:</p>
      <div id="listaCoincidencias"></div>
    </div>
    
    <div id="pantallaResultado" class="display-precio"></div>
    
    <button id="btnVolver" class="oculto btn-principal" onclick="restablecerPantalla()" style="background-color: #7f8c8d;">🔍 Nueva Consulta</button>
  </div>

  <script>
    let productosRegistrados = {};
    let temporizadorRegreso = null;

    document.addEventListener('DOMContentLoaded', () => {
        inicializarApp();
    });

    function configurarCSV() {
        const url = prompt("Enlace CSV de Google Sheets:", localStorage.getItem('csv_master_url') || "");
        if (url !== null) {
            localStorage.setItem('csv_master_url', url);
            location.reload();
        }
    }

    async function inicializarApp() {
        const urlCSV = localStorage.getItem('csv_master_url');
        
        if (urlCSV) {
            try {
                const res = await fetch(urlCSV);
                const data = await res.text();
                // Parseo de CSV respetando comas dentro de comillas
                const filas = data.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                
                productosRegistrados = {};
                filas.forEach(f => {
                    const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (c.length >= 5) {
                        const cod = c[0].replace(/"/g, '').trim();
                        productosRegistrados[cod] = { 
                            nombre: c[1].replace(/"/g, '').trim(), 
                            presentacion: c[2].replace(/"/g, '').trim(), 
                            precio: parseFloat(c[4]) || 0 
                        };
                    }
                });
                
                // Guardamos copia de seguridad local
                localStorage.setItem("backup_kiosko", JSON.stringify(productosRegistrados));
                console.log("Base de datos sincronizada correctamente.");
            } catch (e) {
                console.warn("Error de conexión. Cargando respaldo local.");
                cargarRespaldo();
            }
        } else {
            cargarRespaldo();
        }
    }

    function cargarRespaldo() {
        const backup = localStorage.getItem("backup_kiosko");
        if (backup) productosRegistrados = JSON.parse(backup);
    }

    function dbConsultarProducto(busqueda) {
        const termino = busqueda.toLowerCase().trim();
        // Buscar por código exacto
        if (productosRegistrados[termino]) return [productosRegistrados[termino]];

        // Buscar coincidencias por nombre
        let coincidencias = [];
        for (const cod in productosRegistrados) {
            if (productosRegistrados[cod].nombre.toLowerCase().includes(termino)) {
                coincidencias.push(productosRegistrados[cod]);
            }
        }
        return coincidencias;
    }

    function accionVerificar() {
        const input = document.getElementById("lectorEntrada");
        const busqueda = input.value.trim();
        if (!busqueda) return;

        const resultados = dbConsultarProducto(busqueda);
        
        document.getElementById("pantallaCaptura").classList.add("oculto");
        document.getElementById("btnVolver").classList.remove("oculto");

        if (resultados.length === 1) {
            mostrarPrecioGigante(resultados[0]);
        } else if (resultados.length > 1) {
            mostrarLista(resultados);
        } else {
            const res = document.getElementById("pantallaResultado");
            res.style.display = "block";
            res.innerHTML = `<p class="nombre-producto" style="color: #e74c3c;">❌ No encontrado</p><p>Verifica el código e intenta de nuevo.</p>`;
        }
        
        input.value = "";
        iniciarTemporizador();
    }

    function mostrarPrecioGigante(prod) {
        const res = document.getElementById("pantallaResultado");
        res.style.display = "block";
        document.getElementById("pantallaCoincidencias").style.display = "none";
        res.innerHTML = `
            <p class="nombre-producto">${prod.nombre}</p>
            <p class="presentacion-producto">${prod.presentacion}</p>
            <p class="precio-producto">$${prod.precio.toFixed(2)}</p>
        `;
    }

    function mostrarLista(lista) {
        const contenedor = document.getElementById("pantallaCoincidencias");
        const listaDiv = document.getElementById("listaCoincidencias");
        contenedor.style.display = "block";
        listaDiv.innerHTML = "";
        
        lista.forEach(prod => {
            const div = document.createElement("div");
            div.className = "item-coincidencia";
            div.innerHTML = `
                <div>
                    <div style="font-size: 1.3rem; font-weight: bold;">${prod.nombre}</div>
                    <div style="color: #7f8c8d;">${prod.presentacion}</div>
                </div>
                <div style="font-size: 1.5rem; color: var(--color-acento);">➜</div>
            `;
            div.onclick = () => { mostrarPrecioGigante(prod); iniciarTemporizador(); };
            listaDiv.appendChild(div);
        });
    }

    function iniciarTemporizador() {
        if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
        temporizadorRegreso = setTimeout(restablecerPantalla, 10000); // 10 segundos
    }

    function restablecerPantalla() {
        if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
        document.getElementById("pantallaResultado").style.display = "none";
        document.getElementById("pantallaCoincidencias").style.display = "none";
        document.getElementById("btnVolver").classList.add("oculto");
        document.getElementById("pantallaCaptura").classList.remove("oculto");
        document.getElementById("lectorEntrada").focus();
    }

    document.getElementById("lectorEntrada").addEventListener("keypress", (e) => {
        if (e.key === "Enter") accionVerificar();
    });
  </script>
</body>
</html>
