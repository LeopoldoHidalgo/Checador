<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checador Pro</title>
    <!-- Librería original que te funcionó -->
    <script src="https://unpkg.com" type="text/javascript"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 15px; text-align: center; box-sizing: border-box; }
        #reader { width: 100%; border-radius: 8px; background: #000; display: none; }
        .result-box { margin-top: 15px; padding: 15px; background: #eee; border-radius: 8px; min-height: 60px; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .precio-grande { color: #28a745; font-size: 2.5rem; font-weight: bold; margin: 5px 0; }
        .nombre-grande { font-size: 1.3rem; font-weight: bold; color: #333; }

        /* EL PANEL INICIA OCULTO SIEMPRE */
        #panelRegistro { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Verificador de Precios</h2>
        <button id="btnStart" onclick="encender()">Encender Cámara</button>
        <div id="reader"></div>
        <div class="result-box" id="result-box">Listo para escanear</div>
    </div>

    <!-- Panel de Registro -->
    <div class="card" id="panelRegistro">
        <h3>Registrar Producto</h3>
        <input type="text" id="newCode" placeholder="Código">
        <input type="text" id="newName" placeholder="Nombre del producto">
        <input type="text" id="newPrice" placeholder="Precio (ej: 25.00)">
        <button onclick="guardar()" style="background:#28a745; margin-top:10px;">Guardar en Base de Datos</button>
    </div>

    <script>
        let productos = JSON.parse(localStorage.getItem('misProductos')) || {};
        let scanner = null;

        function encender() {
            if (typeof Html5Qrcode === "undefined") {
                alert("La librería aún no carga. Espera unos segundos y reintenta.");
                return;
            }

            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            scanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            scanner.start({ facingMode: "environment" }, config, (text) => {
                scanner.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('btnStart').style.display = 'block';
                    document.getElementById('btnStart').innerText = "Escanear otro";
                    mostrar(text);
                });
                if (navigator.vibrate) navigator.vibrate(100);
            }).catch(err => {
                alert("Error de cámara: " + err);
                document.getElementById('btnStart').style.display = 'block';
            });
        }

        function mostrar(codigo) {
            const box = document.getElementById('result-box');
            const panel = document.getElementById('panelRegistro');
            const p = productos[codigo];

            if (p) {
                // Si el producto existe, ocultamos el panel de registro
                panel.style.display = 'none';
                box.innerHTML = `
                    <div class="nombre-grande">${p.nombre}</div>
                    <div class="precio-grande">$${p.price}</div>
                    <small>Código: ${codigo}</small>
                `;
            } else {
                // Si no existe, mostramos el panel de registro y llenamos el código
                panel.style.display = 'block';
                box.innerHTML = `No registrado: ${codigo}`;
                document.getElementById('newCode').value = codigo;
            }
        }

        function guardar() {
            const c = document.getElementById('newCode').value;
            const n = document.getElementById('newName').value;
            const p = document.getElementById('newPrice').value;

            if(c && n && p) {
                productos[c] = { nombre: n, price: p };
                localStorage.setItem('misProductos', JSON.stringify(productos));
                alert("¡Guardado!");
                // Ocultar panel y limpiar campos después de guardar
                document.getElementById('panelRegistro').style.display = 'none';
                document.getElementById('newCode').value = '';
                document.getElementById('newName').value = '';
                document.getElementById('newPrice').value = '';
                mostrar(c);
            }
        }
    </script>
</body>
</html>
