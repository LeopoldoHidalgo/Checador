<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Precios - 8 Col</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #2c3e50; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 90%; 
            max-width: 450px; 
            position: relative;
        }

        .settings-icon { 
            position: absolute; top: 15px; right: 15px; 
            cursor: pointer; opacity: 0.15; font-size: 1.2rem; 
        }

        h1 { color: #2c3e50; margin-bottom: 20px; font-size: 1.6rem; font-weight: 800; }

        input { 
            width: 100%; padding: 15px; border: 2px solid #dfe6e9; 
            border-radius: 12px; font-size: 1.3rem; text-align: center;
            outline: none; transition: border-color 0.3s;
            background-color: #f8f9fa;
        }
        input:focus { border-color: #2980b9; background-color: #fff; }

        .resultado { margin-top: 25px; min-height: 160px; display: flex; flex-direction: column; justify-content: center; }
        
        .nombre-prod { font-size: 1.6rem; font-weight: bold; color: #2c3e50; margin: 5px 0; }
        .pres-prod { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 10px; }
        
        .precio-prod { 
            font-size: 3.8rem; 
            font-weight: 900; 
            color: #2ecc71; 
            margin: 5px 0;
        }

        .error { color: #e74c3c; font-weight: bold; font-size: 1.2rem; }
        .instruccion { color: #95a5a6; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="settings-icon" onclick="configurarCSV()">⚙️</div>
        <h1>Verificador de Precios</h1>
        
        <input type="text" id="buscador" placeholder="Escanea el producto..." autofocus onkeydown="if(event.key==='Enter') buscarProducto()">

        <div id="resultado" class="resultado">
            <p class="instruccion">Esperando código...</p>
        </div>
    </div>

    <script>
        let productosDB = {};

        document.addEventListener('DOMContentLoaded', cargarDatos);

        function configurarCSV() {
            const url = prompt("Enlace CSV (8 columnas):", localStorage.getItem('csv_master_url') || "");
            if (url !== null) {
                localStorage.setItem('csv_master_url', url);
                location.reload();
            }
        }

        async function cargarDatos() {
            const url = localStorage.getItem('csv_master_url');
            if (!url) return;

            try {
                const res = await fetch(url);
                const data = await res.text();
                const filas = data.split(/\r?\n/).filter(f => f.trim() !== "").slice(1);
                
                productosDB = {};
                filas.forEach(f => {
                    const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (c.length >= 6) { 
                        const cod = c[0].replace(/"/g, '').trim();
                        productosDB[cod] = {
                            nombre: c[1].replace(/"/g, '').trim(),
                            presentacion: c[2].replace(/"/g, '').trim(),
                            // MAPEO DE 8 COLUMNAS: Precio Público es índice [5] (Columna F)
                            precio: parseFloat(c[5].replace(/"/g, '').trim()) || 0
                        };
                    }
                });
            } catch (e) {
                console.error("Error al cargar datos");
            }
        }

        function buscarProducto() {
            const input = document.getElementById('buscador');
            const resDiv = document.getElementById('resultado');
            const codigo = input.value.trim();

            if (productosDB[codigo]) {
                const p = productosDB[codigo];
                resDiv.innerHTML = `
                    <div class="nombre-prod">${p.nombre}</div>
                    <div class="pres-prod">${p.presentacion}</div>
                    <div class="precio-prod">$${p.precio.toFixed(2)}</div>
                `;
            } else if (codigo !== "") {
                resDiv.innerHTML = `<p class="error">Producto no encontrado</p>`;
            }
            input.value = "";
            input.focus();
        }
    </script>
</body>
</html>
