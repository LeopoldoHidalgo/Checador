<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Precios Kiosko Pro</title>
  
  <style>
    /* --- RECUPERANDO PALETA ORIGINAL --- */
    :root {
      --color-fondo: #2c3e50;      /* Gris Azulado Oscuro */
      --color-primario: #34495e;   /* Azul Grisáceo */
      --color-acento: #2ecc71;     /* Verde Esmeralda (Precios) */
      --color-azul: #2980b9;       /* Azul Rey (Botones/Bordes) */
      --color-texto: #333;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--color-fondo);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .kiosko-container {
      width: 95%;
      max-width: 900px;
      background: #ffffff;
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4); 
      text-align: center;
      box-sizing: border-box;
    }

    h1 { color: var(--color-primario); font-size: 3.5rem; margin: 0 0 10px 0; font-weight: 800; }
    .instruccion { font-size: 1.6rem; color: #7f8c8d; margin-bottom: 30px; }

    /* EL BUSCADOR GIGANTE ORIGINAL */
    input[type="text"] {
      width: 100%;
      padding: 30px;
      font-size: 2.8rem;
      text-align: center;
      border: 4px solid var(--color-azul);
      border-radius: 20px;
      box-sizing: border-box;
      outline: none;
      background-color: #f9f9f9;
      color: #2c3e50;
      font-weight: bold;
    }

    input[type="text"]:focus {
      border-color: var(--color-acento);
      background-color: #fff;
      box-shadow: 0 0 25px rgba(46, 204, 113, 0.3);
    }

    /* PANTALLA DE RESULTADOS */
    .display-precio {
      padding: 40px;
      background: #f1f2f6;
      border-radius: 20px;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    .nombre-producto { font-size: 3rem; color: var(--color-primario); margin: 0; font-weight: 800; }
    .precio-producto { font-size: 10rem; color: var(--color-acento); margin: 20px 0 0 0; font-weight: 900; }

    /* LISTA DE COINCIDENCIAS */
    .contenedor-coincidencias {
      display: none;
      text-align: left;
      max-height: 450px;
      overflow-y: auto;
      padding: 10px;
    }

    .item-coincidencia {
      background: #fff;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 15px;
      border: 3px solid #eee;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .item-coincidencia:hover { border-color: var(--color-azul); background: #f0f0f0; }

    .btn-volver {
      background-color: #7f8c8d;
      margin-top: 30px;
      width: 100%;
      padding: 20px;
      font-size: 1.5rem;
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    /* CONTROLES OCULTOS */
    .admin-gear { position: absolute; top: 15px; right: 15px; width: 50px; height: 50px; opacity: 0.05; cursor: pointer; background: none; border: none; font-size: 24px; }
    .status-bar { position: absolute; bottom: 15px; left: 20px; font-size: 0.9rem; color: white; opacity: 0.6; }
    .oculto { display: none !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body onload="inicializarApp()">

  <button class="admin-gear" onclick="document.getElementById('inputCSV').click()">⚙️</button>
  <input type="file" id="inputCSV" style="display:none" accept=".csv" onchange="cargarArchivoLocal(event)">
  
  <div id="statusLabel" class="status-bar">Listo para buscar</div>

  <div class="kiosko-container">
    
    <div id="pantallaCaptura">
      <h1>VERIFICADOR</h1>
      <p class="instruccion">Escanee el código o escriba el nombre</p>
      <input type="text" id="lectorEntrada" placeholder="Esperando..." autofocus autocomplete="off">
    </div>
    
    <div id="pantallaCoincidencias" class="contenedor-coincidencias">
      <p style="text-align:center; font-weight:bold; font-size: 1.4rem;">Seleccione una opción:</p>
      <div id="listaCoincidencias"></div>
    </div>
    
    <div id="pantallaResultado" class="display-precio"></div>
    
    <button id="btnVolver" class="oculto btn-volver" onclick="restablecerPantalla()">🔍 Nueva Consulta</button>
  </div>

  <script>
    let productosRegistrados = {}; 
    let temporizadorRegreso = null;

    function inicializarApp() {
      const cache = localStorage.getItem('cache_csv_data');
      if (cache) {
        procesarDatosCSV(cache);
        document.getElementById("statusLabel").innerText = "Base de datos cargada";
      }
    }

    function cargarArchivoLocal(event) {
      const archivo = event.target.files[0];
      if (!archivo) return;
      const lector = new FileReader();
      lector.onload = (e) => {
        const contenido = e.target.result;
        localStorage.setItem('cache_csv_data', contenido);
        procesarDatosCSV(contenido);
        document.getElementById("statusLabel").innerText = "Actualizado: " + new Date().toLocaleTimeString();
        alert("¡Datos actualizados correctamente!");
      };
      lector.readAsText(archivo);
    }

    function procesarDatosCSV(data) {
      const filas = data.split(/\r?\n/).filter(f => f.trim() !== "").slice(1);
      productosRegistrados = {};
      filas.forEach(f => {
        const c = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
        if (c.length >= 4) { 
          const cod = c[0].replace(/"/g, '').trim().toLowerCase();
          let precioLimpio = c[3].replace(/"/g, '').replace('$', '').trim();
          productosRegistrados[cod] = {
            nombre: c[1].replace(/"/g, '').trim(),
            precio: parseFloat(precioLimpio) || 0
          };
        }
      });
    }

    function accionVerificar() {
      const input = document.getElementById("lectorEntrada");
      const valor = input.value.trim().toLowerCase();
      if (!valor) return;

      let coincidencias = [];
      if (productosRegistrados[valor]) {
        coincidencias.push(productosRegistrados[valor]);
      } else {
        for (const cod in productosRegistrados) {
          if (productosRegistrados[cod].nombre.toLowerCase().includes(valor)) {
            coincidencias.push(productosRegistrados[cod]);
          }
        }
      }

      document.getElementById("pantallaCaptura").classList.add("oculto");
      document.getElementById("btnVolver").classList.remove("oculto");

      if (coincidencias.length === 1) {
        mostrarPrecio(coincidencias[0]);
      } else if (coincidencias.length > 1) {
        mostrarOpciones(coincidencias);
      } else {
        const resDiv = document.getElementById("pantallaResultado");
        resDiv.style.display = "block";
        resDiv.innerHTML = `<p style="font-size:3rem; color:#e74c3c; font-weight:bold;">❌ NO ENCONTRADO</p>`;
        iniciarAutoLimpieza();
      }
      input.value = "";
    }

    function mostrarPrecio(prod) {
      const resDiv = document.getElementById("pantallaResultado");
      resDiv.style.display = "block";
      resDiv.innerHTML = `
        <p class="nombre-producto">${prod.nombre}</p>
        <p class="precio-producto">$${prod.precio.toFixed(2)}</p>
      `;
      iniciarAutoLimpieza();
    }

    function mostrarOpciones(lista) {
      const pOpc = document.getElementById("pantallaCoincidencias");
      const listaDiv = document.getElementById("listaCoincidencias");
      pOpc.style.display = "block";
      listaDiv.innerHTML = "";
      lista.slice(0, 5).forEach(prod => {
        const div = document.createElement("div");
        div.className = "item-coincidencia";
        div.innerHTML = `<span>${prod.nombre}</span> <b>$${prod.precio.toFixed(2)}</b>`;
        div.onclick = () => {
          pOpc.style.display = "none";
          mostrarPrecio(prod);
        };
        listaDiv.appendChild(div);
      });
      iniciarAutoLimpieza();
    }

    function iniciarAutoLimpieza() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      temporizadorRegreso = setTimeout(restablecerPantalla, 8000); 
    }

    function restablecerPantalla() {
      if (temporizadorRegreso) clearTimeout(temporizadorRegreso);
      document.getElementById("pantallaResultado").style.display = "none";
      document.getElementById("pantallaCoincidencias").style.display = "none";
      document.getElementById("btnVolver").classList.add("oculto");
      document.getElementById("pantallaCaptura").classList.remove("oculto");
      document.getElementById("lectorEntrada").focus();
    }

    document.getElementById("lectorEntrada").addEventListener("keypress", (e) => {
      if (e.key === "Enter") accionVerificar();
    });

    document.body.addEventListener("click", () => {
      if (!document.getElementById("pantallaCaptura").classList.contains("oculto")) {
        document.getElementById("lectorEntrada").focus();
      }
    });
  </script>
</body>
</html>
